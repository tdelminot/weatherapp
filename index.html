<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="tdelminot">  
    <meta name="description" content="Real-time WeatherApp with security features">  
    <title>WeatherApp - Real-time Weather</title>  
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☀️%3C/text%3E%3C/svg%3E">
    
    <!-- 🔒 Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://openweathermap.org https://wttr.in;
        connect-src 'self' https://wttr.in;
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
    ">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="default">
    <div class="container">
        <div style="text-align: center; font-size: 40px;" id="weatherEmoji">🌤️</div>
        <h1>WeatherApp</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="favorites">
            <h3>⭐ Favorites</h3>
            <div id="favoritesList"></div>
        </div>

        <div id="weatherResult"></div>
        
        <!--   PERFORMANCE INFO   -->
        <div id="performanceInfo" style="margin-top: 1rem; padding: 0.8rem; background: #f8f9fa; border-radius: 8px; font-size: 0.85rem; text-align: center; color: #555; border: 1px solid #e9ecef;">
            ⏳ Chargement des performances...
        </div>
        
        <!--   Badge sécurité -->
        <div style="text-align: center; margin-top: 1rem; padding: 0.5rem; font-size: 0.75rem; color: #888; border-top: 1px solid #eee;">
            🛡️ Secured • CSP • Rate Limiting • XSS Protection • Cache localStorage
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
